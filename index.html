<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="2048x2048" href="%BASE_URL%logo.png" />
    <link rel="apple-touch-icon" sizes="2048x2048" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="description" content="Blaberry - Decentralized communities on Nostr" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blaberry" />
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; media-src 'self' https:; connect-src 'self' ws: wss: https:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:;">
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("nostr-reddit-theme");
          var mode = "system";

          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && (parsed.mode === "light" || parsed.mode === "dark" || parsed.mode === "system")) {
              mode = parsed.mode;
            }
          } else {
            var legacy = localStorage.getItem("theme");
            if (legacy === "light" || legacy === "dark") {
              mode = legacy;
            }
          }

          var effectiveMode = mode === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;

          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(effectiveMode);
        } catch (_error) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <title>Blaberry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
